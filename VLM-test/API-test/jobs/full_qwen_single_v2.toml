job_name = "full_qwen_single_v2"

[provider]
adapter = "openai_chat"
model = "qwen3.5-plus-2026-02-15"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
api_key = "env:DASHSCOPE_API_KEY"

[provider.options]
temperature = 1.0
max_tokens = 65536
max_retries = 5
retry_base_delay = 3.0
timeout = 300
max_concurrency = 5

[input]
questions_dir = "../../output/questions"
question_layout = "v2"
question_grouping = "by_type"
question_types = ["qrr", "trr", "fdr"]
batch_size = 20

[images]
mode = "single"
single_view_root = "../../../data-gen/output/images/single_view"

[selection]
split = ""
scene = ""
test_only = true
train_only = false

[prompt]
react_max_rounds = 2
missing_threshold = 0.2
react_chunk_size = 50
save_prompt = true

[output]
results_dir = "../../output/results"
run_name = "qwen3_5_plus_single_v2"
