job_name = "smoke_qwen_1scene"

[provider]
adapter = "openai_chat"
model = "qwen3.5-plus-2026-02-15"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
api_key = "env:DASHSCOPE_API_KEY"

[provider.options]
temperature = 1.0
max_tokens = 4096
max_retries = 3
retry_base_delay = 2.0
timeout = 120
max_concurrency = 1

[input]
questions_dir = "../../output/questions"
question_layout = "v2"
question_grouping = "by_type"
question_types = ["qrr", "trr", "fdr"]
batch_size = 20

[images]
mode = "single"
single_view_root = "../../../data-gen/output/images/single_view"

[selection]
split = "n04"
max_scenes = 1

[prompt]
react_max_rounds = 1
missing_threshold = 0.3
react_chunk_size = 50
save_prompt = true

[output]
results_dir = "../../output/results"
run_name = "smoke_qwen_1scene"
