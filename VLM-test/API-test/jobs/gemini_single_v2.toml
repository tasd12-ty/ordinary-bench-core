job_name = "gemini_single_v2"

[provider]
adapter = "gemini_native"
model = "gemini-3.1-pro-preview"
base_url = "https://llm-chat-api.alibaba-inc.com/v1/api/chat"

[provider.options]
access_key = "env:GEMINI_VLM_ACCESS_KEY"
quota_id = "env:GEMINI_VLM_QUOTA_ID"
user_id = "env:GEMINI_VLM_USER_ID"
app = "llm_application"
temperature = 0.0
max_output_tokens = 65536
include_thoughts = "true"
thinking_budget = 2000
max_retries = 5
retry_base_delay = 2.0
timeout = 6000
max_concurrency = 8

[input]
questions_dir = "../../output/questions"
question_layout = "v2"
question_grouping = "by_type"
question_types = ["qrr", "trr", "fdr"]
batch_size = 20

[images]
mode = "single"
single_view_root = "${GEMINI_VLM_OSS_BASE}/data-gen/output/images/single_view"

[selection]
split = ""
scene = ""
test_only = false
train_only = false

[prompt]
react_max_rounds = 2
missing_threshold = 0.2
react_chunk_size = 50
save_prompt = true

[output]
results_dir = "../../output/results"
run_name = "gemini_3_1_pro_preview_single_v2"
