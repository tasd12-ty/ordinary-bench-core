job_name = "local_qwen3p5_multi_view"

[provider]
adapter = "openai_chat"
model = "qwen3p5_397B_A17B"
base_url = "http://localhost:8234/v1"
api_key = "no-key"

[provider.options]
temperature = 0.0
max_tokens = 65536
max_retries = 5
retry_base_delay = 2.0
timeout = 300
max_concurrency = 128

[input]
questions_dir = "../../output/questions"
question_layout = "v2"
question_grouping = "by_type"
question_types = ["qrr", "trr", "fdr"]
batch_size = 20

[images]
mode = "multi_view"
multi_view_root = "../../../data-gen/output/images/multi_view"
n_views = 4

[selection]
split = ""
scene = ""
test_only = true
train_only = false

[prompt]
react_max_rounds = 2
missing_threshold = 0.2
react_chunk_size = 50
save_prompt = true

[output]
results_dir = "../../output/results"
run_name = "qwen3p5_397B_multi_view"
