job_name = "condition_a"

[provider]
adapter = "openai_chat"
model = "openai/gpt-4o"
base_url = "https://openrouter.ai/api/v1"
api_key = "env:OPENROUTER_API_KEY"

[provider.options]
temperature = 1.0
max_tokens = 65536
max_retries = 5
retry_base_delay = 2.0
timeout = 120
max_concurrency = 4

[input]
questions_dir = "../../output/questions"
question_layout = "v1"
question_grouping = "mixed"
question_types = ["qrr", "trr", "fdr"]
batch_size = 20

[images]
mode = "single"
single_view_root = "../../../data-gen/output/images/single_view"

[selection]
split = ""
scene = ""
test_only = false
train_only = false

[prompt]
react_max_rounds = 2
missing_threshold = 0.2
react_chunk_size = 50
save_prompt = true

[output]
results_dir = "../../output/results"
run_name = "condition_a"
