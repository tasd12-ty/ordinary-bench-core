job_name = "full_claude_multi_view"

[provider]
adapter = "ali_internal"
model = "claude-opus-4-6"
base_url = "https://llm-chat-api.alibaba-inc.com/v1/api/chat"

[provider.options]
access_key = "env:ALI_INTERNAL_ACCESS_KEY"
quota_id = "env:ALI_INTERNAL_QUOTA_ID"
user_id = "env:ALI_INTERNAL_USER_ID"
temperature = 1.0
max_tokens = 4096
max_retries = 5
retry_base_delay = 3.0
timeout = 300
max_concurrency = 3

[input]
questions_dir = "../../output/questions"
question_layout = "v1"
question_grouping = "mixed"
question_types = ["qrr", "trr", "fdr"]
batch_size = 20

[images]
mode = "multi_view"
multi_view_root = "../../../data-gen/output/images/multi_view"
n_views = 4

[selection]
split = ""
scene = ""
test_only = true
train_only = false

[prompt]
react_max_rounds = 2
missing_threshold = 0.2
react_chunk_size = 50
save_prompt = true

[output]
results_dir = "../../output/results"
run_name = "claude_opus_multi_view"
