# 使用 HuggingFace 数据集进行 VLM 评测的示例 job 配置。
#
# 前置步骤：先用 hf_to_local.py 将数据集转换为本地格式
#   python datasets/hf_to_local.py --repo TYTSTQ/ordinary-bench --split test --output ./hf_data
#
# 然后修改下面的 model / api_key 后运行：
#   cd VLM-test/API-test && python run_eval.py --job ../../datasets/jobs/hf_eval_example.toml

job_name = "hf_eval_example"

[provider]
adapter = "openai_chat"
model = "openai/gpt-4o"
base_url = "https://openrouter.ai/api/v1"
api_key = "env:OPENROUTER_API_KEY"

[provider.options]
temperature = 0.0
max_tokens = 65536
max_retries = 5
retry_base_delay = 2.0
timeout = 120
max_concurrency = 4

[input]
questions_dir = "../../hf_data/questions"
question_layout = "v2"
question_types = ["qrr", "trr", "fdr"]
batch_size = 20

[images]
mode = "single"
single_view_root = "../../hf_data/images/single_view"

[selection]
test_only = false   # HF split 已在转换时过滤

[prompt]
react_max_rounds = 2
missing_threshold = 0.2

[output]
results_dir = "../../hf_data/results"
run_name = "hf_eval_example"
