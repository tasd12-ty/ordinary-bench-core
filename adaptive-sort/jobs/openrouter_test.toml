# OpenRouter test with Gemma 4 31B (free tier)

[provider]
adapter = "openai_chat"
model = "google/gemma-4-31b-it:free"
base_url = "https://openrouter.ai/api/v1"
api_key = "env:OPENROUTER_API_KEY"

[provider.options]
temperature = 0.0
max_tokens = 1024

[input]
scenes_dir = "../../datasets/test-data/scenes"
tau = 0.10

[images]
mode = "none"

[selection]
split = "n04"
max_scenes = 1

[sorting]
pivot_strategy = "middle"
max_retries = 3
retry_base_delay = 3.0
max_concurrency = 1

[output]
results_dir = "./output/results"
