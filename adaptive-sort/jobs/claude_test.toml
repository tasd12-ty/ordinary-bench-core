# Small-scale test using Claude API directly.
# Requires ANTHROPIC_API_KEY environment variable.

[provider]
adapter = "anthropic"
model = "claude-sonnet-4-6"
api_key = "env:ANTHROPIC_API_KEY"

[provider.options]
temperature = 0.0
max_tokens = 1024

[input]
scenes_dir = "../../datasets/test-data/scenes"
tau = 0.10

[images]
mode = "single"
single_view_root = "../../datasets/test-data/images"

[selection]
split = "n04"
max_scenes = 1

[sorting]
pivot_strategy = "middle"
max_retries = 2
retry_base_delay = 2.0
max_concurrency = 2

[output]
results_dir = "./output/results"
