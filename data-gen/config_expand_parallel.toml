# ordinary-bench 高并行增量扩充配置
# 将 7 个 split 拆为 42 个子 split，每个 15 场景，支持 20+ 并行 worker
# 命令: python generate.py --config config_expand_parallel.toml --gpu --workers 20

[blender]
executable = "blender"
use_gpu = true

[rendering]
width = 480
height = 320
samples = 256
n_views = 4
camera_distance = 12.0
elevation = 30.0
azimuth_start = 45.0

[objects]
min_count = 4
max_count = 10
min_dist = 0.25
margin = 0.4

[output]
dir = "./output"
seed = 42

# ═══════════════════════════════════════════
# n04: 6 sub-splits × 15 scenes = 90 (idx 10-99)
# ═══════════════════════════════════════════
