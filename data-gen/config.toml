# ordinary-bench data generation configuration

[blender]
executable = "/mnt/d/tools/blender/blender.exe"
use_gpu = true

[rendering]
width = 480
height = 320
samples = 256           # Cycles samples (lower = faster, noisier)
n_views = 4             # Camera viewpoints per scene
camera_distance = 12.0
elevation = 30.0        # Degrees
azimuth_start = 45.0    # Degrees

[objects]
min_count = 4
max_count = 10
min_dist = 0.25         # Minimum distance between object centers
margin = 0.4            # Directional margin for placement

[output]
dir = "./output"
seed = 42

# 每种物体数量10个场景，共70场景
[splits.n04]
n_scenes = 10
min_objects = 4
max_objects = 4

[splits.n05]
