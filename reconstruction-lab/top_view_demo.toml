[blender]
executable = "/Applications/Blender.app/Contents/MacOS/Blender"
use_gpu = false

[rendering]
width = 480
height = 320
samples = 32
n_views = 4
camera_distance = 12.0
elevation = 30.0
azimuth_start = 45.0
render_top_view = true
top_view_padding = 2.5

[objects]
min_count = 4
max_count = 6
min_dist = 0.25
margin = 0.4

[output]
dir = "./reconstruction-lab/top_view_demo_output"
seed = 123

[splits.n04]
n_scenes = 1
min_objects = 4
max_objects = 4

[splits.n05]
n_scenes = 1
min_objects = 5
max_objects = 5

[splits.n06]
n_scenes = 1
min_objects = 6
max_objects = 6
