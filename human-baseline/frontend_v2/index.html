<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORDINARY-BENCH 人类基线测试</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="view-welcome" class="view">
    <div class="welcome-card">
      <h1 class="welcome-title">ORDINARY-BENCH</h1>
      <p class="welcome-subtitle">空间关系推理 - 人类基线测试</p>

      <div class="welcome-desc">
        <p>请选择本次测试的交互方式。</p>
        <ul>
          <li><strong>递进式测试</strong>：先看单视角，只对错题追加更多视角，并即时批改。</li>
          <li><strong>Adaptive Sort</strong>：固定一个 pivot 距离对，逐步比较 candidate 距离对，不显示标准答案。</li>
        </ul>
      </div>

      <div class="welcome-form">
        <label for="input-annotator" class="form-label">标注员 ID</label>
        <input
          id="input-annotator"
          type="text"
          class="form-input"
          placeholder="请输入您的标识"
          autocomplete="off"
        />

        <div class="mode-section">
          <div class="form-label">测试方法</div>
          <div class="mode-grid">
            <label class="mode-card" data-mode-card="progressive">
              <input type="radio" name="test-mode" value="progressive" checked />
              <div class="mode-card-body">
                <div class="mode-card-title-row">
                  <span class="mode-card-title">递进式测试</span>
                  <span class="mode-chip">默认</span>
                </div>
                <p class="mode-card-desc">单视角起步，只重答错题，提交后即时批改。</p>
                <p class="mode-card-status" data-mode-status="progressive"></p>
              </div>
            </label>

            <label class="mode-card" data-mode-card="adaptive_sort">
              <input type="radio" name="test-mode" value="adaptive_sort" />
              <div class="mode-card-body">
                <div class="mode-card-title-row">
                  <span class="mode-card-title">Adaptive Sort</span>
                  <span class="mode-chip mode-chip-secondary">Quick Sort</span>
                </div>
                <p class="mode-card-desc">围绕 pivot 距离对做批量比较，逐步推进，不显示正确答案。</p>
                <p class="mode-card-status" data-mode-status="adaptive_sort"></p>
              </div>
            </label>
          </div>
        </div>

        <button id="btn-start" class="btn btn-primary btn-lg" disabled>
          开始测试
        </button>
        <p id="welcome-error" class="error-text"></p>
      </div>
    </div>
  </div>

  <div id="view-quiz" class="view hidden">
    <header class="topbar">
      <div class="topbar-left">
        <span class="topbar-brand">ORDINARY-BENCH</span>
        <span id="topbar-mode" class="topbar-tag"></span>
        <span id="topbar-scene" class="topbar-tag"></span>
        <span id="topbar-round" class="topbar-tag tag-round"></span>
      </div>
      <div class="topbar-right">
        <span id="topbar-progress" class="topbar-info"></span>
        <span id="topbar-timer" class="topbar-timer">00:00</span>
      </div>
    </header>

    <div id="round-banner" class="round-banner hidden">
      <span id="round-banner-text"></span>
    </div>

    <div class="quiz-layout">
      <aside class="image-panel" id="image-panel">
        <div id="image-area" class="image-area"></div>
        <div class="object-legend">
          <h3 class="legend-title">场景物体</h3>
          <div id="object-list" class="object-list"></div>
        </div>
      </aside>

      <main class="question-panel">
        <section id="progressive-workspace">
          <div class="question-header">
            <span id="answer-count" class="answer-count"></span>
            <button id="btn-submit-round" class="btn btn-primary" disabled>
              提交本轮
            </button>
          </div>
          <div id="question-list" class="question-list"></div>
        </section>

        <section id="adaptive-workspace" class="hidden">
          <div class="adaptive-toolbar">
            <div class="adaptive-toolbar-copy">
              <div id="adaptive-step-progress" class="adaptive-toolbar-title"></div>
              <div id="adaptive-step-hint" class="adaptive-toolbar-subtitle"></div>
            </div>
            <div class="adaptive-toolbar-actions">
              <span id="adaptive-answer-count" class="answer-count"></span>
              <button id="btn-submit-step" class="btn btn-primary" disabled>
                提交本 step
              </button>
            </div>
          </div>
          <div id="adaptive-workbench" class="adaptive-workbench"></div>
        </section>
      </main>
    </div>
  </div>

  <div id="view-grading" class="view hidden">
    <div class="grading-card">
      <div id="grading-summary" class="grading-summary"></div>
      <div id="grading-results" class="grading-results"></div>
      <div class="grading-actions">
        <button id="btn-next-round" class="btn btn-primary btn-lg hidden">
          进入下一轮
        </button>
        <button id="btn-next-scene" class="btn btn-primary btn-lg hidden">
          下一个场景
        </button>
        <button id="btn-finish" class="btn btn-primary btn-lg hidden">
          测试完成
        </button>
      </div>
    </div>
  </div>

  <div id="view-stepdone" class="view hidden">
    <div class="stepdone-card">
      <div id="stepdone-summary" class="stepdone-summary"></div>
      <div class="stepdone-actions">
        <button id="btn-next-step" class="btn btn-primary btn-lg hidden">
          进入下一步
        </button>
        <button id="btn-step-next-scene" class="btn btn-primary btn-lg hidden">
          下一个场景
        </button>
        <button id="btn-step-finish" class="btn btn-primary btn-lg hidden">
          测试完成
        </button>
      </div>
    </div>
  </div>

  <div id="view-done" class="view hidden">
    <div class="done-card">
      <div class="done-icon">&#9733;</div>
      <h2>全部完成</h2>
      <p class="done-subtitle">感谢您的参与。</p>
      <div id="done-stats" class="done-stats"></div>
      <button id="btn-restart" class="btn btn-outline btn-lg">
        重新开始
      </button>
    </div>
  </div>

  <div id="lightbox" class="lightbox hidden" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="" />
  </div>

  <div id="toast" class="toast"></div>

  <script src="/app.js"></script>
</body>
</html>
