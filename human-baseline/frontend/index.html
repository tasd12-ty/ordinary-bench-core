<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ORDINARY-BENCH 人类基线测试</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <!-- ==================== Welcome View ==================== -->
  <div id="view-welcome" class="view">
    <div class="welcome-container">
      <div class="welcome-card">
        <h1 class="welcome-title">ORDINARY-BENCH<br>人类基线测试</h1>
        <p class="welcome-subtitle">视觉语言模型空间关系理解能力评估</p>

        <div class="welcome-form">
          <label class="form-label" for="input-annotator">标注员 ID</label>
          <input
            id="input-annotator"
            type="text"
            class="form-input"
            placeholder="请输入你的 ID（如 alice）"
            autocomplete="off"
            spellcheck="false"
          >

          <label class="form-label">测试类型</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="test-type" value="single_view" checked>
              <span class="radio-label">
                <span class="radio-title">单视角 (Single View)</span>
                <span class="radio-desc">每个场景只展示 1 张图片</span>
              </span>
            </label>
            <label class="radio-option">
              <input type="radio" name="test-type" value="multi_view">
              <span class="radio-label">
                <span class="radio-title">多视角 (Multi View)</span>
                <span class="radio-desc">每个场景展示 4 张不同角度的图片</span>
              </span>
            </label>
          </div>

          <button id="btn-start" class="btn btn-primary btn-large" disabled>开始测试</button>
          <p id="welcome-error" class="error-message"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== Quiz View ==================== -->
  <div id="view-quiz" class="view hidden">
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-left">
        <span id="topbar-progress" class="badge badge-progress">第 1 页</span>
        <span id="topbar-scenes" class="badge badge-muted">已完成 0/0 场景</span>
      </div>
      <div class="topbar-center">
        <span id="topbar-scene-id" class="badge badge-scene">--</span>
      </div>
      <div class="topbar-right">
        <span id="topbar-annotator" class="topbar-annotator">--</span>
        <span id="topbar-timer" class="badge badge-timer">00:00</span>
      </div>
    </header>

    <!-- Main quiz content -->
    <main class="quiz-main">
      <!-- Image area -->
      <section id="image-area" class="image-area">
        <!-- Populated by JS -->
      </section>

      <!-- Content area: objects + questions -->
      <section class="content-area">
        <!-- Object sidebar -->
        <aside class="object-sidebar">
          <h3 class="sidebar-title">物体列表</h3>
          <div id="object-list" class="object-list">
            <!-- Populated by JS -->
          </div>
        </aside>

        <!-- Question list -->
        <div class="question-column">
          <div class="question-header">
            <span id="answer-count" class="answer-count">已答: 0/0</span>
            <button id="btn-submit-page" class="btn btn-primary" disabled>提交本页</button>
          </div>
          <div id="question-list" class="question-list">
            <!-- Populated by JS -->
          </div>
        </div>
      </section>
    </main>

    <!-- Bottom bar -->
    <footer class="bottombar">
      <span id="bottom-timer" class="badge badge-timer">00:00</span>
      <span id="bottom-completion" class="bottom-completion">已答: 0/0</span>
    </footer>
  </div>

  <!-- ==================== Submitted View ==================== -->
  <div id="view-submitted" class="view hidden">
    <div class="submitted-container">
      <div class="submitted-card">
        <div class="checkmark-icon">&#10003;</div>
        <h2 class="submitted-title">本页完成！</h2>
        <div id="submitted-stats" class="submitted-stats">
          <!-- Populated by JS -->
        </div>
        <div id="submitted-progress" class="submitted-progress">
          <!-- Populated by JS -->
        </div>
        <div class="submitted-actions">
          <button id="btn-next-page" class="btn btn-primary btn-large">继续下一页</button>
          <button id="btn-end-session" class="btn btn-secondary">结束测试</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== Done View ==================== -->
  <div id="view-done" class="view hidden">
    <div class="submitted-container">
      <div class="submitted-card">
        <div class="checkmark-icon done-icon">&#9733;</div>
        <h2 class="submitted-title">所有题目已完成！</h2>
        <p class="done-message">感谢你完成了全部测试。你的回答已经保存。</p>
        <div id="done-stats" class="submitted-stats"></div>
        <div class="submitted-actions">
          <button id="btn-restart" class="btn btn-secondary btn-large">返回首页</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
